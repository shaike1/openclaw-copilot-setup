services:
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      # Override these via .env file or environment variables:
      # - GITHUB_COPILOT_CLIENT_ID=Iv1.b507a08c87ecfe98
      # - RATE_LIMIT_DEFAULT=60
      # - RATE_LIMIT_CHAT_COMPLETIONS=20
      # - LOG_LEVEL=info
    volumes:
      - copilot-tokens:/root/.github-copilot-proxy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  copilot-tokens:
